<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .title { font: 700 30px/1.2 Arial, Helvetica, sans-serif; fill: #0f172a; }
      .heading { font: 700 24px/1.2 Arial, Helvetica, sans-serif; fill: #0f172a; }
      .label { font: 600 20px/1.2 Arial, Helvetica, sans-serif; fill: #0f172a; }
      .small { font: 500 18px/1.2 Arial, Helvetica, sans-serif; fill: #475569; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 20; }
      .chip { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1.5; rx: 14; }
      .accent { stroke: #2563eb; stroke-width: 3; fill: none; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563eb" />
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#f8fafc" />
  <text x="600" y="80" text-anchor="middle" class="title">Learning Paradigms at a Glance</text>

  <!-- Supervised -->
  <rect x="60" y="140" width="340" height="480" class="card" />
  <text x="230" y="190" text-anchor="middle" class="heading">Supervised</text>
  <rect x="110" y="240" width="240" height="60" class="chip" />
  <text x="230" y="278" text-anchor="middle" class="label">Input (x)</text>
  <line x1="230" y1="300" x2="230" y2="340" class="accent" marker-end="url(#arrow)" />
  <rect x="110" y="340" width="240" height="60" class="chip" />
  <text x="230" y="378" text-anchor="middle" class="label">Model</text>
  <line x1="230" y1="400" x2="230" y2="440" class="accent" marker-end="url(#arrow)" />
  <rect x="110" y="440" width="240" height="60" class="chip" />
  <text x="230" y="478" text-anchor="middle" class="label">Label (y)</text>
  <text x="230" y="540" text-anchor="middle" class="small">Predict the correct answer</text>

  <!-- Unsupervised -->
  <rect x="430" y="140" width="340" height="480" class="card" />
  <text x="600" y="190" text-anchor="middle" class="heading">Unsupervised</text>
  <rect x="480" y="260" width="240" height="60" class="chip" />
  <text x="600" y="298" text-anchor="middle" class="label">Data</text>
  <line x1="600" y1="320" x2="600" y2="360" class="accent" marker-end="url(#arrow)" />
  <rect x="480" y="360" width="240" height="60" class="chip" />
  <text x="600" y="398" text-anchor="middle" class="label">Model</text>
  <line x1="600" y1="420" x2="600" y2="460" class="accent" marker-end="url(#arrow)" />
  <rect x="480" y="460" width="240" height="60" class="chip" />
  <text x="600" y="498" text-anchor="middle" class="label">Structure</text>
  <text x="600" y="540" text-anchor="middle" class="small">Discover hidden patterns</text>

  <!-- Reinforcement -->
  <rect x="800" y="140" width="340" height="480" class="card" />
  <text x="970" y="190" text-anchor="middle" class="heading">Reinforcement</text>
  <rect x="850" y="250" width="240" height="70" class="chip" />
  <text x="970" y="292" text-anchor="middle" class="label">Agent</text>
  <rect x="850" y="430" width="240" height="70" class="chip" />
  <text x="970" y="472" text-anchor="middle" class="label">Environment</text>
  <line x1="970" y1="320" x2="970" y2="430" class="accent" marker-end="url(#arrow)" />
  <line x1="1030" y1="430" x2="1030" y2="320" class="accent" marker-end="url(#arrow)" />
  <text x="970" y="540" text-anchor="middle" class="small">Learn by reward and interaction</text>
</svg>
